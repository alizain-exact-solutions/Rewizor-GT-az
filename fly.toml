# fly.toml app configuration file generated for rewizor-backend-az on 2026-04-16T11:36:29+05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rewizor-backend-az'
primary_region = 'ams'

[build]

[deploy]
  release_command = 'alembic upgrade head'

[env]
  LOG_LEVEL = 'INFO'
  PYTHONPATH = '/app'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
