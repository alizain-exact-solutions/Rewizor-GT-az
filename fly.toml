# fly.toml — Rewizor GT EPP Export API
#
# Deploy:
#   fly launch       (first time — creates the app + attaches Postgres)
#   fly deploy       (subsequent deploys)
#
# Required secrets (set with `fly secrets set KEY=value`):
#   OPENAI_API_KEY
#   SENDER_COMPANY_NAME
#   SENDER_COMPANY_NIP
# Optional secrets — see .env.example for the full list.
#
# DATABASE_URL is injected automatically by Fly when you attach a
# Postgres cluster with `fly postgres attach`.

app = 'rewizor-backend-az'
primary_region = 'ams'

[build]

[deploy]
  release_command = 'alembic upgrade head'

[env]
  LOG_LEVEL = 'INFO'
  PYTHONPATH = '/app'

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpus = 1
  memory_mb = 512
