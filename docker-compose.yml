services:
  api:
    build: .
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DB_HOST=db
      - DB_PORT=5434
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      uvicorn src.api.main:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"
    depends_on:
      - redis
      - db

  celery-worker:
    build: .
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - DB_HOST=db
      - DB_PORT=5434
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
      celery -A src.workers.celery_app.celery_app worker -l info"
    depends_on:
      - redis
      - db

  db:
    image: postgres:15-alpine
    command: ["postgres", "-p", "5434"]
    environment:
      - POSTGRES_USER=${DB_USER:-user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-password}
      - POSTGRES_DB=${DB_NAME:-rewizor_db}
    ports:
      - "5434:5434"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  pgdata:
